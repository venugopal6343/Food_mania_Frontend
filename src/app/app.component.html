<header class="site-header">
  <div class="container nav-wrap">
    <a routerLink="/dashboard" class="brand" (click)="closeNav()">FOOD<span>_MANIA</span></a>

    @if (auth.isAuthenticated()) {
      <button
        class="menu-toggle"
        type="button"
        aria-label="Toggle navigation"
        [attr.aria-expanded]="navOpen()"
        (click)="toggleNav()"
      >
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" [class.open]="navOpen()">
        <a routerLink="/dashboard" routerLinkActive="active-link" (click)="closeNav()">Dashboard</a>
        <a routerLink="/profile" routerLinkActive="active-link" (click)="closeNav()">Profile</a>
        <button type="button" class="nav-cta" (click)="logout()">Logout</button>
      </nav>
    }
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<fm-toast />
