<section class="auth-page">
  <div class="container auth-grid">
    <div class="auth-copy">
      <p class="eyebrow">Delivery-First Cloud Kitchen</p>
      <h1>Street soul. Chef precision. Fast operations.</h1>
      <p>
        Sign in to manage a live Food Mania session with menu discovery, cart state,
        checkout, and order history backed by the Spring Boot API.
      </p>
      <div class="seed-actions" aria-label="Seed account shortcuts">
        <button type="button" (click)="quickLogin('user')">Use User Seed</button>
        <button type="button" (click)="quickLogin('admin')">Use Admin Seed</button>
      </div>
    </div>

    <div class="auth-card surface-panel">
      <fm-generic-form
        [config]="formConfig"
        [submitting]="submitting()"
        (formSubmit)="submit($event)"
      />
      <p class="auth-switch">
        New to Food Mania?
        <a routerLink="/auth/signup">Create account</a>
      </p>
    </div>
  </div>
</section>
